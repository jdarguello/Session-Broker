# Redis Bitnami Helm values
# https://github.com/bitnami/charts/tree/main/bitnami/redis

# Bitnami retired the free docker.io/bitnami/* versioned tags on 2025-08-28
# (Broadcom "Bitnami Secure Images" migration). The pinned tag this chart
# references was moved verbatim to the frozen docker.io/bitnamilegacy/* repo.
# Repoint there to keep the demo working. NOTE: bitnamilegacy is unmaintained
# (no further updates/CVE fixes) — for production, migrate to maintained images.
image:
  registry: docker.io
  repository: bitnamilegacy/redis

architecture: standalone

auth:
  enabled: true
  existingSecret: redis-secret
  existingSecretPasswordKey: redis-password

master:
  persistence:
    enabled: true
    size: 2Gi

replica:
  replicaCount: 0  # standalone mode; set >0 for HA

service:
  type: ClusterIP
  port: 6379
