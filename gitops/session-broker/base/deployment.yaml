apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-broker
  namespace: session-broker
  labels:
    app: session-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-broker
  template:
    metadata:
      labels:
        app: session-broker
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "session-broker"
        dapr.io/app-port: "8000"
        dapr.io/config: "keycloak-config"
        dapr.io/log-level: "info"
    spec:
      serviceAccountName: session-broker
      containers:
        - name: session-broker
          image: ghcr.io/jdarguello/session-broker:latest
          ports:
            - containerPort: 8000
          env:
            - name: DAPR_STATE_STORE
              value: "redis"
            - name: APP_ENV
              value: "production"
            # ⚠️ DEMO ONLY — plaintext throwaway AES-256 key (base64 of 32 bytes).
            # Committed so the writer/reader can encrypt/decrypt token material for
            # the ArgoCon demo without an out-of-band Secret. This is an explicitly
            # accepted demo gap (same category as the trusted /auth/callback/cache
            # write path). DO NOT use for anything real. At go-live, delete this and
            # source it from a `session-broker-secret` via secretKeyRef.
            - name: TOKEN_ENCRYPTION_KEY
              value: "lIlY2h9S1NPc2+QqFnNx4Wz9TPuPXzHiW0InHJURpNc="
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
