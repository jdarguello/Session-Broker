name: Build and Push Image to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-image.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/jdarguello/session-broker

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Emulation so the amd64 runner can also build the linux/arm64 image
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          # Multi-arch so the image pulls on both amd64 and arm64 (e.g. a local
          # Apple-Silicon cluster). Building amd64-only is what caused ErrImagePull.
          platforms: linux/amd64,linux/arm64
          # Skip the provenance attestation so the manifest list stays a clean
          # two-entry index (no `unknown/unknown` entry) for maximum pull compatibility.
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
