apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: session-broker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jdarguello/Session-Broker.git
    targetRevision: HEAD
    path: gitops/session-broker/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: session-broker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
